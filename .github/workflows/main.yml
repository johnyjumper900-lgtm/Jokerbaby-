name: Build iOS IPA (Full project + iOS platform fix)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Installation de Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Installation des dépendances
        run: bun install

      - name: 🔨 Build web (génère le dossier dist)
        run: bun run build

      # --------------------------------------------------------------
      # Copie intégrale du projet dans dist (pour ne rien oublier)
      # --------------------------------------------------------------
      - name: 📦 Copie de TOUS les fichiers du projet dans dist/full_project
        run: |
          mkdir -p dist/full_project
          rsync -av --progress . dist/full_project/ \
            --exclude node_modules \
            --exclude .git \
            --exclude dist \
            --exclude ios \
            --exclude DerivedData \
            --exclude .github
          echo "✅ Projet copié. Taille : $(du -sh dist/full_project | cut -f1)"

      # --------------------------------------------------------------
      # Ajout de la plateforme iOS (indispensable avant sync)
      # --------------------------------------------------------------
      - name: 📱 Ajout de la plateforme iOS (si absente)
        run: |
          if [ ! -d "ios" ]; then
            echo "📱 Ajout de la plateforme iOS..."
            bunx cap add ios
          else
            echo "✅ Plateforme iOS déjà présente"
          fi

      # --------------------------------------------------------------
      # Synchronisation Capacitor (copie dist/ vers ios/App/App/public)
      # --------------------------------------------------------------
      - name: 🔄 Synchronisation Capacitor
        run: bunx cap sync ios

      # --------------------------------------------------------------
      # Compilation de l'IPA non signé
      # --------------------------------------------------------------
      - name: 🛠️ Compilation iOS (unsigned IPA)
        run: |
          cd ios
          DERIVED_DATA_PATH=$(pwd)/DerivedData
          rm -rf "$DERIVED_DATA_PATH"

          xcodebuild -workspace App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath "$DERIVED_DATA_PATH" \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     build

          APP_PATH=$(find "$DERIVED_DATA_PATH" -name "App.app" -path "*/Release-iphoneos/*" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ App.app introuvable"
            exit 1
          fi

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ../App-unsigned.ipa Payload
          cd ..

      - name: 📤 Upload de l'IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-app-full
          path: App-unsigned.ipa
          retention-days: 7