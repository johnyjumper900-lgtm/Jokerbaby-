name: Build Full iOS App (Bun + Capacitor)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # 1. Génère le dossier 'dist' avec ton projet React/Vite
      - name: Build Web Project
        run: bun run build

      # 2. Force la création du dossier 'ios' et copie le dossier 'dist' dedans
      - name: Capacitor Sync
        run: |
          bun x cap add ios || true
          # Important : On s'assure que Capacitor sait qu'il doit copier 'dist'
          bun x cap copy ios
          bun x cap sync ios

      # 3. Compilation Xcode forcée (Inclusion de tout le projet)
      - name: Build Native iOS (Unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build-data \
                     SYMROOT=$(pwd)/build-output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean build

          # Création de la structure IPA
          mkdir -p Payload
          cp -r build-output/Release-iphoneos/App.app Payload/
          
          # Affiche la taille pour vérifier que tout est là (doit être > 30-40Mo)
          du -sh Payload/App.app
          
          zip -r ../../App-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: full-project-ipa
          path: App-unsigned.ipa
