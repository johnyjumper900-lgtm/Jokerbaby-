- name: Copy ALL assets (forced)
  run: |
    TARGET="ios/App/App/public"
    # 1. Copie du build web (obligatoire)
    cp -r ${{ steps.detect.outputs.web_dir }}/* "$TARGET/"
    # 2. Copie du dossier public/ (images, etc.) – forcée, écrase si nécessaire
    if [ -d "public" ]; then
      cp -rf public/* "$TARGET/" 2>/dev/null || true
    fi
    # 3. Copie de src/assets (si existant)
    if [ -d "src/assets" ]; then
      mkdir -p "$TARGET/src/assets"
      cp -rf src/assets/* "$TARGET/src/assets/"
    fi
    # 4. Copie de tous les fichiers .png, .jpg, .jpeg, .gif, .webp, .ttf, .woff2 (peu importe où)
    find . -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.gif" -o -iname "*.webp" -o -iname "*.ttf" -o -iname "*.woff2" \) \
      -not -path "./node_modules/*" -not -path "./dist/*" -not -path "./ios/*" -not -path "./.git/*" \
      -exec cp --parents {} "$TARGET/" \;
    # 5. Copie des fichiers PWA à la racine
    cd "$TARGET"
    for f in manifest.webmanifest manifest.json icon-192.png icon-512.png apple-touch-icon.png; do
      [ -f "../../../../$f" ] && cp -f "../../../../$f" . 2>/dev/null || true
    done
    # 6. Restauration de l'index.html si écrasé
    if ! grep -q "assets/" index.html; then
      cp ${{ steps.detect.outputs.web_dir }}/index.html .
    fi