name: Build iOS App (Full Project)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Web Project
        run: bun run build

      # Synchronise l'intégralité de ton build Web dans le dossier iOS
      - name: Capacitor Sync
        run: |
          bun x cap add ios || true
          bun x cap sync ios

      - name: Build Native iOS (Unsigned)
        run: |
          cd ios/App
          # Compilation de l'intégralité du projet en mode Release
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build-data \
                     SYMROOT=$(pwd)/build-output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean build

          # Création de l'IPA contenant tout le projet
          mkdir -p Payload
          cp -r build-output/Release-iphoneos/App.app Payload/
          zip -r ../../App-unsigned.ipa Payload

      - name: Upload Full IPA
        uses: actions/upload-artifact@v4
        with:
          name: full-project-ipa
          path: App-unsigned.ipa
          if-no-files-found: error
