name: Build iOS App (Bun Edition)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Web Project
        run: bun run build

      - name: Setup Capacitor iOS
        run: |
          bun x cap add ios
          bun x cap sync ios

      # --- ÉTAPE MANQUANTE : COMPILATION NATIVE ---
      - name: Build iOS App (Native)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release archive -archivePath App.xcarchive
          xcodebuild -exportArchive -archivePath App.xcarchive -exportOptionsPlist exportOptions.plist -exportPath output

      # --- ÉTAPE INDISPENSABLE POUR RÉCUPÉRER L'IPA ---
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-release
          path: ios/App/output/*.ipa
          retention-days: 7
