name: Build iOS IPA (iOS 17 – forcé)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies (with speech plugin)
        run: |
          bun install
          bun add @capacitor-community/speech-recognition @capacitor/browser

      - name: Build web
        run: bun run build

      - name: Detect web dir
        id: detect
        run: |
          if [ -d "dist/client" ] && [ -f "dist/client/index.html" ]; then
            echo "web_dir=dist/client" >> $GITHUB_OUTPUT
          elif [ -f "dist/index.html" ]; then
            echo "web_dir=dist" >> $GITHUB_OUTPUT
          else
            echo "❌ No index.html"
            exit 1
          fi

      - name: Force analyzeTicket in bundle
        run: |
          if ! grep -r "analyzeTicket" "${{ steps.detect.outputs.web_dir }}" --include="*.js" > /dev/null; then
            echo 'import "../../src/server-api/analyze-ticket";' >> "${{ steps.detect.outputs.web_dir }}/assets/force.js"
          fi

      - name: Create Capacitor config (iOS 17)
        run: |
          cat > capacitor.config.ts <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.jokerbaby.app',
            appName: 'Jokerbaby',
            webDir: '${{ steps.detect.outputs.web_dir }}',
            overrideUserAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1',
            ios: { deploymentTarget: '17.0', limitsNavigationsToAppBoundDomains: false },
            server: { iosScheme: 'https', hostname: 'app.jokerbaby.com', allowNavigation: [ "*.winamax.fr", "*.winamax.com" ] }
          };
          export default config;
          EOF

      - name: Add iOS platform
        run: |
          rm -rf ios
          npx cap add ios

      # --------------------------------------------------
      # FORCE iOS 17 dans Podfile ET Xcode project
      # --------------------------------------------------
      - name: Set iOS 17 in Podfile
        run: |
          sed -i '' 's/platform :ios, .*/platform :ios, "17.0"/' ios/App/Podfile
          echo "=== Podfile modifié ==="
          cat ios/App/Podfile

      - name: Set deployment target in Xcode project
        run: |
          PROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 17.0/g' "$PROJ"
          grep "IPHONEOS_DEPLOYMENT_TARGET" "$PROJ" | head -3

      # --------------------------------------------------
      # Copie des assets (sans écrasement de index.html)
      # --------------------------------------------------
      - name: Copy web build
        run: |
          rm -rf ios/App/App/public
          mkdir -p ios/App/App/public
          cp -r ${{ steps.detect.outputs.web_dir }}/* ios/App/App/public/

      - name: Copy public/ assets (images, etc.)
        run: |
          if [ -d "public" ]; then
            cp -rf public/* ios/App/App/public/ 2>/dev/null || true
          fi

      - name: Copy PWA files
        run: |
          cd ios/App/App/public
          for f in manifest.webmanifest manifest.json icon-192.png icon-512.png apple-touch-icon.png; do
            [ -f "../../../../$f" ] && cp -f "../../../../$f" . || true
          done

      - name: Restore index.html if corrupted
        run: |
          cd ios/App/App/public
          if ! grep -q "assets/" index.html; then
            cp ${{ steps.detect.outputs.web_dir }}/index.html .
          fi

      # --------------------------------------------------
      # Synchro Capacitor + pod install manuel (sécurisé)
      # --------------------------------------------------
      - name: Capacitor sync (without pod install)
        run: npx cap sync ios --no-update  # ne lance pas pod install

      - name: Manual pod install with iOS 17
        run: |
          cd ios/App
          pod install --repo-update

      # --------------------------------------------------
      # Icônes et permissions
      # --------------------------------------------------
      - name: Prepare icon
        run: |
          mkdir -p assets
          if [ -f "public/icon-512.png" ]; then cp public/icon-512.png assets/icon.png; \
          elif [ -f "icon-512.png" ]; then cp icon-512.png assets/icon.png; fi

      - name: Generate icons
        run: |
          npm install -g @capacitor/assets
          npx capacitor-assets generate --ios || echo "Icon skip"

      - name: Add permissions & ATS
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Microphone required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSSpeechRecognitionUsageDescription string 'Speech recognition required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Camera required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Photos required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent bool true" $PLIST

      # --------------------------------------------------
      # Build archive & IPA
      # --------------------------------------------------
      - name: Build archive
        run: |
          cd ios
          rm -rf ~/Library/Developer/Xcode/DerivedData
          xcodebuild -workspace App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     archive

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R ios/App.xcarchive/Products/Applications/App.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-final
          path: app.ipa
          retention-days: 7