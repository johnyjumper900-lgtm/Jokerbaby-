name: Build iOS IPA (Stable Fix)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node & Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          bun add @capacitor-community/speech-recognition @capacitor/browser

      - name: Build web app
        run: bun run build

      - name: Detect build folder
        id: detect
        run: |
          if [ -d "dist" ]; then echo "web_dir=dist" >> $GITHUB_OUTPUT
          elif [ -d "build" ]; then echo "web_dir=build" >> $GITHUB_OUTPUT
          else echo "❌ Build folder introuvable"; exit 1; fi

      - name: Create Capacitor config (FIX WINAMAX)
        run: |
          cat > capacitor.config.ts <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.jokerbaby.app',
            appName: 'Jokerbaby',
            webDir: '${{ steps.detect.outputs.web_dir }}',
            overrideUserAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1',
            server: {
              allowNavigation: ['*.winamax.fr', '*.winamax.com', 'winamax.fr', 'winamax.com'],
              iosScheme: 'https',
              hostname: 'app.jokerbaby.com'
            },
            ios: {
              deploymentTarget: '15.0',
              limitsNavigationsToAppBoundDomains: false
            }
          };
          export default config;
          EOF

      - name: Add iOS platform
        run: npx cap add ios || true

      # --- FIX CRITIQUE POUR L'ERREUR DE PODS ---
      - name: Force iOS Deployment Target in Podfile
        run: |
          # Définit iOS 15.0 comme cible minimale dans le Podfile pour satisfaire les plugins[span_1](start_span)[span_1](end_span)
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/" ios/App/Podfile
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '15.0'/" ios/App/Podfile
          
      - name: Capacitor sync
        run: npx cap sync ios

      - name: iOS permissions & Winamax Security Fix (Info.plist)
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Microphone requis'" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSSpeechRecognitionUsageDescription string 'Reconnaissance vocale requise'" $PLIST || true
          /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent bool true" $PLIST

      - name: Build Xcode Archive
        run: |
          cd ios
          xcodebuild \
            -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            archive

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R ios/App.xcarchive/Products/Applications/App.app Payload/
          zip -r app.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-winamax-fixed
          path: app.ipa
          retention-days: 7
