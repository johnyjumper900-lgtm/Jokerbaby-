name: Build iOS App (Bun Edition)

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Web Project
        run: bun run build

      - name: Setup Capacitor iOS
        run: |
          bunx cap add ios || echo "iOS platform already exists"
          bunx cap sync ios
