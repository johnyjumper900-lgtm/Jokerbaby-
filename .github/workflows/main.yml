name: Build iOS IPA (Full assets, no blank page)

on:
  workflow_dispatch:          # Déclenchement manuel depuis l'interface GitHub
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1. Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installation de Node.js (obligatoire pour Capacitor)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Installation de Bun (si vous l'utilisez pour le build web)
      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # 4. Installation des dépendances avec Bun
      - name: Install dependencies
        run: bun install

      # 5. Build web (produit dist/ ou dist/client)
      - name: Build web app
        run: bun run build

      # 6. Détection du dossier web généré
      - name: Detect web directory
        id: webdir
        run: |
          if [ -d "dist/client" ] && [ -f "dist/client/index.html" ]; then
            echo "web_dir=dist/client" >> $GITHUB_OUTPUT
          elif [ -f "dist/index.html" ]; then
            echo "web_dir=dist" >> $GITHUB_OUTPUT
          else
            echo "❌ No index.html found in dist/ or dist/client/"
            exit 1
          fi

      # 7. Régénération propre de la plateforme iOS (supprime l'ancien dossier)
      - name: Add iOS platform (clean)
        run: |
          rm -rf ios
          npx cap add ios
          npx cap config webDir ${{ steps.webdir.outputs.web_dir }}

      # 8. Copie du build web (fichiers essentiels)
      - name: Copy web build to public
        run: |
          rm -rf ios/App/App/public
          mkdir -p ios/App/App/public
          cp -r ${{ steps.webdir.outputs.web_dir }}/* ios/App/App/public/

      # 9. Copie des ressources statiques (dossier public/ de votre projet) – sans écraser
      - name: Copy static assets (public folder)
        run: |
          if [ -d "public" ] && [ "$(ls -A public)" ]; then
            cp -rn public/* ios/App/App/public/ 2>/dev/null || true
            echo "✅ Static assets copied from public/"
          fi

      # 10. Copie des fichiers PWA (manifest, icônes) à la racine de public
      - name: Copy PWA files
        run: |
          cd ios/App/App/public
          for file in manifest.webmanifest manifest.json icon-192.png icon-512.png apple-touch-icon.png; do
            if [ -f "../../../../$file" ]; then
              cp -n "../../../../$file" . 2>/dev/null || true
            fi
          done

      # 11. Vérification que index.html est bien présent
      - name: Verify index.html
        run: |
          if [ ! -f "ios/App/App/public/index.html" ]; then
            echo "❌ index.html missing – build failed"
            exit 1
          fi
          echo "✅ index.html found"

      # 12. Synchronisation Capacitor (installe les plugins et pods)
      - name: Capacitor sync
        run: npx cap sync ios

      # 13. Compilation de l'application iOS (non signée)
      - name: Build unsigned IPA
        run: |
          cd ios
          # Nettoyage des caches Xcode
          rm -rf ~/Library/Developer/Xcode/DerivedData
          # Build
          xcodebuild -workspace App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     build
          # Recherche du .app généré
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -path "*/Release-iphoneos/*" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ App.app not found"
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ../App-unsigned.ipa Payload
          cd ..

      # 14. Upload de l'IPA comme artifact
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-app
          path: App-unsigned.ipa
          retention-days: 7