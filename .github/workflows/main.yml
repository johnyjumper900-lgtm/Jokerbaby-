name: Build iOS IPA with all assets (Capacitor + Bun)

on:
  workflow_dispatch:          # déclenchement manuel
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Installation de Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Installation des dépendances
        run: bun install

      - name: 🔨 Build web (génère le dossier dist)
        run: bun run build
        # Assurez-vous que votre package.json contient un script "build"

      - name: 📸 Copie de tous les PNG et assets du dossier "public" vers "dist"
        run: |
          # Vérifier que le dossier public existe et n'est pas vide
          if [ -d "public" ] && [ "$(ls -A public)" ]; then
            echo "📁 Copie récursive de public/ vers dist/"
            cp -r public/* dist/
          else
            echo "⚠️ Dossier 'public' introuvable ou vide – aucune ressource supplémentaire copiée"
          fi

          echo "📄 Contenu final du dossier dist après ajout des PNG :"
          find dist -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) | head -20 || echo "  (aucune image trouvée)"

      - name: ✅ Vérification du dossier dist
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "❌ Le dossier dist est vide ou inexistant – build échoué"
            exit 1
          fi
          echo "📊 Taille totale de dist : $(du -sh dist | cut -f1)"

      - name: 📱 Ajout de la plateforme iOS (si absente)
        run: |
          if [ ! -d "ios" ]; then
            echo "📱 Plateforme iOS manquante – ajout en cours..."
            bunx cap add ios
          else
            echo "✅ Plateforme iOS déjà présente"
          fi

      - name: 🔄 Synchronisation Capacitor (copie dist vers ios)
        run: bunx cap sync ios

      - name: 🛠️ Compilation de l'application iOS non signée
        run: |
          cd ios
          DERIVED_DATA_PATH=$(pwd)/DerivedData
          rm -rf "$DERIVED_DATA_PATH"

          xcodebuild -workspace App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath "$DERIVED_DATA_PATH" \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     build

          APP_PATH=$(find "$DERIVED_DATA_PATH" -name "App.app" -path "*/Release-iphoneos/*" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ App.app introuvable"
            exit 1
          fi

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ../App-unsigned.ipa Payload
          cd ..

      - name: 🔍 Inspection rapide de l'IPA
        run: |
          echo "📦 Taille de l'IPA généré :"
          ls -lh App-unsigned.ipa
          echo "📂 Contenu de l'IPA (premiers fichiers) :"
          unzip -l App-unsigned.ipa | head -20

      - name: 💾 Upload de l'IPA comme artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-app
          path: App-unsigned.ipa
          retention-days: 7