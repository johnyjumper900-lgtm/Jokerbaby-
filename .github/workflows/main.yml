name: Build iOS IPA (Node 22 – Full Assets)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22               # ← CHANGÉ : 22 au lieu de 20
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          bun add @capacitor/cli @capacitor/ios @capacitor/browser

      - name: Build web app
        run: bun run build

      - name: Detect web folder
        id: detect
        run: |
          if [ -d "dist/client" ] && [ -f "dist/client/index.html" ]; then
            echo "web_dir=dist/client" >> $GITHUB_OUTPUT
          elif [ -f "dist/index.html" ]; then
            echo "web_dir=dist" >> $GITHUB_OUTPUT
          else
            exit 1
          fi

      - name: Force analyzeTicket in bundle
        run: |
          WEB_DIR="${{ steps.detect.outputs.web_dir }}"
          if ! grep -r "analyzeTicket" "$WEB_DIR" --include="*.js"; then
            echo 'import { analyzeTicket } from "../../src/server-api/analyze-ticket";' >> "$WEB_DIR/assets/force.js"
            echo 'window.analyzeTicket = analyzeTicket;' >> "$WEB_DIR/assets/force.js"
          fi

      - name: Create Capacitor config (iOS 17)
        run: |
          cat > capacitor.config.ts <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.jokerbaby.app',
            appName: 'Jokerbaby',
            webDir: '${{ steps.detect.outputs.web_dir }}',
            ios: { deploymentTarget: '17.0' },
            server: { allowNavigation: [ "*.winamax.fr", "*.winamax.com" ] }
          };
          export default config;
          EOF

      - name: Add iOS platform
        run: |
          rm -rf ios
          npx cap add ios

      - name: Force iOS 17 in Podfile & Xcode
        run: |
          sed -i '' 's/platform :ios, .*/platform :ios, "17.0"/' ios/App/Podfile
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 17.0/g' ios/App/App.xcodeproj/project.pbxproj

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Copy all assets to public
        run: |
          TARGET="ios/App/App/public"
          rm -rf "$TARGET"
          mkdir -p "$TARGET"
          cp -r ${{ steps.detect.outputs.web_dir }}/* "$TARGET/"
          if [ -d "public" ]; then
            cp -rf public/* "$TARGET/" 2>/dev/null || true
          fi
          if [ -d "src/assets" ]; then
            mkdir -p "$TARGET/src/assets"
            cp -rf src/assets/* "$TARGET/src/assets/" 2>/dev/null || true
          fi
          find . -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.gif" -o -iname "*.webp" -o -iname "*.svg" -o -iname "*.ttf" -o -iname "*.woff2" -o -iname "*.json" \) \
            -not -path "./node_modules/*" -not -path "./dist/*" -not -path "./ios/*" -not -path "./.git/*" \
            -exec cp --parents {} "$TARGET/" \; 2>/dev/null || true
          cd "$TARGET"
          for f in manifest.webmanifest manifest.json icon-192.png icon-512.png apple-touch-icon.png; do
            [ -f "../../../../$f" ] && cp -f "../../../../$f" . 2>/dev/null || true
          done
          if ! grep -q "assets/" index.html; then
            cp ${{ steps.detect.outputs.web_dir }}/index.html .
          fi
          echo "✅ Taille du dossier public :"
          du -sh "$TARGET"

      - name: Capacitor copy
        run: npx cap copy ios

      - name: Add ATS and permissions
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent bool true" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Caméra requise'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Photos requises'" $PLIST 2>/dev/null || true

      - name: Build archive
        run: |
          cd ios
          rm -rf ~/Library/Developer/Xcode/DerivedData
          xcodebuild -workspace App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     archive

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R ios/App.xcarchive/Products/Applications/App.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-final
          path: app.ipa
          retention-days: 7