- name: 🌍 Aspiration de toutes les ressources (images, polices, données)
  run: |
    # Créer un dossier pour les ressources supplémentaires
    mkdir -p dist/extra_assets

    # 1. Copier tout le dossier public (déjà fait plus tôt, mais on le refait pour être sûr)
    if [ -d "public" ]; then
      cp -r public/* dist/
    fi

    # 2. Copier tous les PNG, JPG, etc. depuis TOUT le projet (sauf node_modules, dist, ios, .git, src/.tsx? mais on garde)
    find . -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.gif" -o -iname "*.svg" -o -iname "*.webp" -o -iname "*.ttf" -o -iname "*.otf" -o -iname "*.woff2" -o -iname "*.json" \) \
         -not -path "./node_modules/*" \
         -not -path "./dist/*" \
         -not -path "./ios/*" \
         -not -path "./.git/*" \
         -exec cp --parents {} dist/extra_assets/ \;

    # 3. Si vous voulez absolument TOUS les fichiers (y compris sources, configs) – déconseillé mais possible
    # find . -type f -not -path "./node_modules/*" -not -path "./dist/*" -not -path "./ios/*" -not -path "./.git/*" -exec cp --parents {} dist/extra_assets/ \;

    echo "✅ Contenu de extra_assets :"
    ls -la dist/extra_assets/ | head -20
    echo "Taille totale extra_assets : $(du -sh dist/extra_assets | cut -f1)"