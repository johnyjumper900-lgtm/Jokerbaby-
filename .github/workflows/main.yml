name: Build Full iOS App
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Full NPM Install
        run: |
          npm install --no-package-lock
          npm install -D @capacitor/assets

      - name: Build Web Project
        run: npm run build

      - name: Generate App Icons
        run: |
          npx capacitor-assets generate --ios

      - name: Capacitor Sync
        run: |
          npx cap add ios || true
          npx cap copy ios
          npx cap sync ios

      - name: Build Native iOS (Unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build-data \
                     SYMROOT=$(pwd)/build-output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean build

          mkdir -p Payload
          cp -r build-output/Release-iphoneos/App.app Payload/
          
          echo "Vérification du contenu final :"
          du -sh Payload/App.app
          
          zip -r ../../App-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: full-project-ipa
          path: App-unsigned.ipa
