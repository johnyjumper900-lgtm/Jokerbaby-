name: Build Full Project IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4[span_2](start_span)[span_2](end_span)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20[span_3](start_span)[span_3](end_span)

      - name: Install All Dependencies
        run: |
          # On installe tout le projet (src, supabase, etc.)
          npm install --no-package-lock[span_4](start_span)[span_4](end_span)
          npm install -D @capacitor/assets @capacitor/cli @capacitor/ios[span_5](start_span)[span_5](end_span)

      - name: Build Web Application
        run: |
          # Compile tout ton code source (src/) vers le dossier dist/
          npm run build[span_6](start_span)[span_6](end_span)

      - name: Initialize Native iOS
        run: |
          # Crée le dossier ios/ que tu n'as pas sur image_4.png
          npx cap add ios || true[span_7](start_span)[span_7](end_span)
          # Génère les icônes pour ne pas avoir une app vide
          npx capacitor-assets generate --ios[span_8](start_span)[span_8](end_span)
          # Aspire le dossier dist/ vers le projet iOS
          npx cap copy ios[span_9](start_span)[span_9](end_span)
          npx cap sync ios[span_10](start_span)[span_10](end_span)

      - name: Xcode Compilation (Unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build-data \
                     SYMROOT=$(pwd)/build-output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean build[span_11](start_span)[span_11](end_span)

          mkdir -p Payload
          cp -r build-output/Release-iphoneos/App.app Payload/[span_12](start_span)[span_12](end_span)
          
          echo "Taille réelle du projet aspiré :"
          du -sh Payload/App.app[span_13](start_span)[span_13](end_span)
          
          zip -r ../../Full-Project.ipa Payload[span_14](start_span)[span_14](end_span)

      - name: Upload Complete IPA
        uses: actions/upload-artifact@v4
        with:
          name: Full-IPA-Package
          path: Full-Project.ipa[span_15](start_span)[span_15](end_span)
