name: Build iOS IPA (Full Stable)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      # --------------------------------------------------
      # Checkout
      # --------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Node
      # --------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # --------------------------------------------------
      # Bun
      # --------------------------------------------------
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # --------------------------------------------------
      # Install deps
      # --------------------------------------------------
      - name: Install dependencies
        run: bun install

      # --------------------------------------------------
      # Build app
      # --------------------------------------------------
      - name: Build web app
        run: bun run build

      # --------------------------------------------------
      # Detect build folder
      # --------------------------------------------------
      - name: Detect build folder
        id: detect
        run: |
          if [ -f "dist/index.html" ]; then
            echo "web_dir=dist" >> $GITHUB_OUTPUT
          elif [ -f "dist/client/index.html" ]; then
            echo "web_dir=dist/client" >> $GITHUB_OUTPUT
          else
            echo "❌ Build introuvable"
            exit 1
          fi

      # --------------------------------------------------
      # Capacitor config
      # --------------------------------------------------
      - name: Create Capacitor config
        run: |
          cat > capacitor.config.ts <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.jokerbaby.app',
            appName: 'Jokerbaby',
            webDir: '${{ steps.detect.outputs.web_dir }}',

            ios: {
              deploymentTarget: '15.0'
            },

            server: {
              cleartext: true,
              allowNavigation: [
                "*.winamax.fr",
                "*.winamax.com"
              ]
            }
          };

          export default config;
          EOF

      # --------------------------------------------------
      # Clean iOS
      # --------------------------------------------------
      - name: Clean iOS
        run: rm -rf ios

      # --------------------------------------------------
      # Add iOS
      # --------------------------------------------------
      - name: Add iOS platform
        env:
          CAPACITOR_IOS_DEPLOYMENT_TARGET: 15.0
        run: npx cap add ios

      # --------------------------------------------------
      # Fix Podfile
      # --------------------------------------------------
      - name: Fix Podfile deployment target
        run: |
          PODFILE="ios/App/Podfile"
          sed -i '' "s/platform :ios, .*/platform :ios, '15.0'/" "$PODFILE" || true
          cat "$PODFILE"

      # --------------------------------------------------
      # Sync Capacitor
      # --------------------------------------------------
      - name: Capacitor sync
        run: npx cap sync ios

      # --------------------------------------------------
      # Install pods
      # --------------------------------------------------
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      # --------------------------------------------------
      # Prepare icon from public
      # --------------------------------------------------
      - name: Prepare icon
        run: |
          mkdir -p assets
          cp public/icon.png assets/icon.png

      # --------------------------------------------------
      # Generate iOS icons
      # --------------------------------------------------
      - name: Generate icons
        run: |
          npm install -g @capacitor/assets
          npx capacitor-assets generate --ios

      # --------------------------------------------------
      # iOS permissions
      # --------------------------------------------------
      - name: Add permissions
        run: |
          PLIST="ios/App/App/Info.plist"

          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string Microphone required" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSSpeechRecognitionUsageDescription string Speech recognition required" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string Camera required" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string Photos required" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" $PLIST || true

      # --------------------------------------------------
      # Copy build
      # --------------------------------------------------
      - name: Copy web build
        run: |
          rm -rf ios/App/App/public/*
          cp -R ${{ steps.detect.outputs.web_dir }}/. ios/App/App/public/

      # --------------------------------------------------
      # Copy public assets too
      # --------------------------------------------------
      - name: Copy public assets
        run: |
          cp -R public/. ios/App/App/public/ || true

      # --------------------------------------------------
      # Optional full project copy
      # --------------------------------------------------
      - name: Copy full project
        run: |
          mkdir -p ios/App/App/public/fullproject

          rsync -av ./ ios/App/App/public/fullproject/ \
            --exclude ios \
            --exclude node_modules \
            --exclude .git

      # --------------------------------------------------
      # Build archive
      # --------------------------------------------------
      - name: Build archive
        run: |
          cd ios
          rm -rf ~/Library/Developer/Xcode/DerivedData

          xcodebuild \
            -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      # --------------------------------------------------
      # Create IPA
      # --------------------------------------------------
      - name: Create IPA
        run: |
          cd ios
          mkdir Payload

          APP=$(find App.xcarchive -name "*.app" | head -1)

          cp -R "$APP" Payload/

          ditto -c -k --sequesterRsrc --keepParent Payload ../app.ipa

      # --------------------------------------------------
      # Upload IPA
      # --------------------------------------------------
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: app.ipa
          retention-days: 7