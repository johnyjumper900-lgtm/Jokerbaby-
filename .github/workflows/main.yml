name: Build iOS IPA (Node 22 – Capacitor 7 Stable)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      # ─────────────────────────────────────────────
      # Checkout
      # ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # Node.js
      # ─────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ─────────────────────────────────────────────
      # Bun
      # ─────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # ─────────────────────────────────────────────
      # Clean old caches
      # ─────────────────────────────────────────────
      - name: Clean environment
        run: |
          rm -rf node_modules
          rm -rf ios
          rm -f bun.lockb

      # ─────────────────────────────────────────────
      # Install dependencies
      # ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          bun install

          # Capacitor versions MUST match
          bun add \
            @capacitor/core@7 \
            @capacitor/cli@7 \
            @capacitor/ios@7 \
            @capacitor/browser@7

      # ─────────────────────────────────────────────
      # Show versions
      # ─────────────────────────────────────────────
      - name: Show Capacitor versions
        run: |
          npx cap --version
          bun pm ls | grep capacitor || true

      # ─────────────────────────────────────────────
      # Build web app
      # ─────────────────────────────────────────────
      - name: Build web app
        run: bun run build

      # ─────────────────────────────────────────────
      # Detect web directory
      # ─────────────────────────────────────────────
      - name: Detect web folder
        id: detect
        run: |
          if [ -d "dist/client" ] && [ -f "dist/client/index.html" ]; then
            echo "web_dir=dist/client" >> $GITHUB_OUTPUT
          elif [ -d "dist" ] && [ -f "dist/index.html" ]; then
            echo "web_dir=dist" >> $GITHUB_OUTPUT
          else
            echo "❌ Aucun dossier web trouvé"
            exit 1
          fi

          echo "✅ Web dir:"
          echo "${{ steps.detect.outputs.web_dir }}"

      # ─────────────────────────────────────────────
      # Capacitor config
      # ─────────────────────────────────────────────
      - name: Create capacitor.config.ts
        run: |
          WEB_DIR="${{ steps.detect.outputs.web_dir }}"

          cat > capacitor.config.ts <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.jokerbaby.app',
            appName: 'Jokerbaby',
            webDir: '$WEB_DIR',
            ios: {
              deploymentTarget: '17.0'
            },
            server: {
              allowNavigation: [
                "*.winamax.fr",
                "*.winamax.com"
              ]
            }
          };

          export default config;
          EOF

          cat capacitor.config.ts

      # ─────────────────────────────────────────────
      # Add iOS platform
      # ─────────────────────────────────────────────
      - name: Add iOS platform
        run: |
          npx cap add ios

      # ─────────────────────────────────────────────
      # Sync Capacitor
      # ─────────────────────────────────────────────
      - name: Sync Capacitor
        run: |
          npx cap sync ios

      # ─────────────────────────────────────────────
      # Force iOS 17
      # ─────────────────────────────────────────────
      - name: Force deployment target
        run: |
          sed -i '' \
            's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 17.0/g' \
            ios/App/App.xcodeproj/project.pbxproj

      # ─────────────────────────────────────────────
      # Copy assets manually
      # ─────────────────────────────────────────────
      - name: Copy assets to public
        run: |
          WEB_DIR="${{ steps.detect.outputs.web_dir }}"
          TARGET="ios/App/App/public"

          rm -rf "$TARGET"
          mkdir -p "$TARGET"

          cp -R "$WEB_DIR/." "$TARGET/"

          if [ -d "public" ]; then
            cp -Rf public/. "$TARGET/" || true
          fi

          if [ -d "src/assets" ]; then
            mkdir -p "$TARGET/src/assets"
            cp -Rf src/assets/. "$TARGET/src/assets/" || true
          fi

          echo "✅ Public folder size:"
          du -sh "$TARGET"

      # ─────────────────────────────────────────────
      # Info.plist permissions
      # ─────────────────────────────────────────────
      - name: Configure Info.plist
        run: |
          PLIST="ios/App/App/Info.plist"

          /usr/libexec/PlistBuddy \
            -c "Delete :NSAppTransportSecurity" \
            "$PLIST" 2>/dev/null || true

          /usr/libexec/PlistBuddy \
            -c "Add :NSAppTransportSecurity dict" \
            "$PLIST"

          /usr/libexec/PlistBuddy \
            -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" \
            "$PLIST"

          /usr/libexec/PlistBuddy \
            -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent bool true" \
            "$PLIST"

          /usr/libexec/PlistBuddy \
            -c "Add :NSCameraUsageDescription string 'Camera access required'" \
            "$PLIST" 2>/dev/null || true

          /usr/libexec/PlistBuddy \
            -c "Add :NSPhotoLibraryUsageDescription string 'Photo library access required'" \
            "$PLIST" 2>/dev/null || true

      # ─────────────────────────────────────────────
      # Clean Xcode cache
      # ─────────────────────────────────────────────
      - name: Clean Xcode cache
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData

      # ─────────────────────────────────────────────
      # Build archive
      # ─────────────────────────────────────────────
      - name: Build archive
        run: |
          cd ios

          xcodebuild \
            -project App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            archive | tee xcodebuild.log

          if [ ! -d "App.xcarchive" ]; then
            echo "❌ Archive failed"
            cat xcodebuild.log
            exit 1
          fi

          echo "✅ Archive created"

      # ─────────────────────────────────────────────
      # Create IPA
      # ─────────────────────────────────────────────
      - name: Create IPA
        run: |
          mkdir -p Payload

          APP=$(find ios/App.xcarchive/Products/Applications -name "*.app" | head -1)

          if [ -z "$APP" ]; then
            echo "❌ .app not found"
            exit 1
          fi

          cp -R "$APP" Payload/

          zip -r app.ipa Payload

          echo "✅ IPA generated"
          ls -lh app.ipa

      # ─────────────────────────────────────────────
      # Upload IPA
      # ─────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: app.ipa
          retention-days: 7

      # ─────────────────────────────────────────────
      # Upload logs on failure
      # ─────────────────────────────────────────────
      - name: Upload Xcode logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-logs
          path: ios/xcodebuild.log
          retention-days: 3