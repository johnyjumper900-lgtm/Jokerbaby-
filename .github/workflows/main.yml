name: Build iOS IPA (with Capacitor)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'                # fonctionne car package-lock.json existe

      - name: Install dependencies
        run: npm ci                   # plus rapide et fiable que npm install

      # ... reste de votre workflow (build web, cap sync, xcodebuild...)