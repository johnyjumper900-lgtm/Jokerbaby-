name: Build Full iOS IPA + Micro + Web Access

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-ios:
    runs-on: macos-14

    steps:

      ########################################################
      # CHECKOUT
      ########################################################
      - name: Checkout repository
        uses: actions/checkout@v4

      ########################################################
      # NODE
      ########################################################
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      ########################################################
      # BUN
      ########################################################
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      ########################################################
      # INSTALL DEPENDENCIES
      ########################################################
      - name: Install dependencies
        run: bun install

      ########################################################
      # INSTALL CAPACITOR SPEECH
      ########################################################
      - name: Install speech recognition plugin
        run: |
          bun add @capacitor-community/speech-recognition

      ########################################################
      # BUILD APP
      ########################################################
      - name: Build web app
        run: bun run build

      ########################################################
      # DETECT BUILD
      ########################################################
      - name: Detect build folder
        id: detect
        run: |
          if [ -f "dist/index.html" ]; then
            echo "web_dir=dist" >> $GITHUB_OUTPUT
          elif [ -f "dist/client/index.html" ]; then
            echo "web_dir=dist/client" >> $GITHUB_OUTPUT
          else
            echo "❌ Build introuvable"
            exit 1
          fi

      ########################################################
      # GENERATE CAPACITOR CONFIG
      ########################################################
      - name: Generate capacitor.config.ts
        run: |
          cat > capacitor.config.ts <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.jokerbaby.app',
            appName: 'Jokerbaby',
            webDir: '${{ steps.detect.outputs.web_dir }}',
            bundledWebRuntime: false,

            server: {
              cleartext: true,
              allowNavigation: [
                "*.winamax.fr",
                "*.winamax.com"
              ]
            },

            ios: {
              contentInset: "always"
            }
          };

          export default config;
          EOF

      ########################################################
      # REMOVE OLD IOS
      ########################################################
      - name: Remove old iOS platform
        run: rm -rf ios

      ########################################################
      # ADD IOS
      ########################################################
      - name: Add iOS platform
        run: npx cap add ios

      ########################################################
      # CONFIGURE IOS PERMISSIONS
      ########################################################
      - name: Configure iOS permissions
        run: |
          PLIST="ios/App/App/Info.plist"

          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string Microphone access is required for voice features" $PLIST || true

          /usr/libexec/PlistBuddy -c "Add :NSSpeechRecognitionUsageDescription string Speech recognition is required" $PLIST || true

          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string Camera access is required" $PLIST || true

          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string Photo access is required" $PLIST || true

          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string Photo save access is required" $PLIST || true

          /usr/libexec/PlistBuddy -c "Add :NSBluetoothAlwaysUsageDescription string Bluetooth access is required" $PLIST || true

          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string Location access is required" $PLIST || true

          /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string Location access is required" $PLIST || true

          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" $PLIST || true

          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" $PLIST || true

      ########################################################
      # ALLOW WEB ACCESS
      ########################################################
      - name: Enable arbitrary web access
        run: |
          PLIST="ios/App/App/Info.plist"

          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" $PLIST || true

          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" $PLIST || true

          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent bool true" $PLIST || true

      ########################################################
      # CAPACITOR SYNC
      ########################################################
      - name: Capacitor sync
        run: npx cap sync ios

      ########################################################
      # CLEAN PUBLIC FOLDER
      ########################################################
      - name: Clean public folder
        run: |
          rm -rf ios/App/App/public/*
          mkdir -p ios/App/App/public

      ########################################################
      # COPY BUILD
      ########################################################
      - name: Copy build files
        run: |
          cp -R ${{ steps.detect.outputs.web_dir }}/. ios/App/App/public/

      ########################################################
      # COPY PUBLIC ASSETS
      ########################################################
      - name: Copy public assets
        run: |
          if [ -d "public" ]; then
            rsync -av public/ ios/App/App/public/
          fi

      ########################################################
      # FORCE COPY FULL PROJECT
      ########################################################
      - name: Force copy full project
        run: |
          mkdir -p ios/App/App/public/fullproject

          rsync -av ./ ios/App/App/public/fullproject/ \
            --exclude ios \
            --exclude node_modules \
            --exclude .git \
            --exclude dist \
            --exclude coverage \
            --exclude .next

      ########################################################
      # VERIFY FILES
      ########################################################
      - name: Verify copied files
        run: |
          echo "📁 Public :"
          ls -lah ios/App/App/public

          echo "📦 Full project size :"
          du -sh ios/App/App/public/fullproject

          if [ ! -f "ios/App/App/public/index.html" ]; then
            echo "❌ index.html manquant"
            exit 1
          fi

      ########################################################
      # BUILD IOS
      ########################################################
      - name: Build iOS app
        run: |
          cd ios

          rm -rf ~/Library/Developer/Xcode/DerivedData

          xcodebuild \
            -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      ########################################################
      # PACKAGE IPA
      ########################################################
      - name: Package IPA
        run: |
          cd ios

          mkdir Payload

          APP_PATH=$(find App.xcarchive -name "*.app" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ App.app introuvable"
            exit 1
          fi

          cp -R "$APP_PATH" Payload/App.app

          ditto -c -k --sequesterRsrc --keepParent Payload ../Jokerbaby-Full.ipa

      ########################################################
      # IPA SIZE
      ########################################################
      - name: Show IPA size
        run: |
          ls -lh Jokerbaby-Full.ipa

      ########################################################
      # UPLOAD IPA
      ########################################################
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: jokerbaby-ios-full
          path: Jokerbaby-Full.ipa
          retention-days: 7