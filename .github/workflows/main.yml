name: Build iOS IPA (iOS 18 – Final)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies (include speech plugin)
        run: |
          bun install
          bun add @capacitor-community/speech-recognition @capacitor/browser

      - name: Build web app
        run: bun run build

      - name: Detect build folder
        id: detect
        run: |
          if [ -d "dist/client" ] && [ -f "dist/client/index.html" ]; then
            echo "web_dir=dist/client" >> $GITHUB_OUTPUT
          elif [ -f "dist/index.html" ]; then
            echo "web_dir=dist" >> $GITHUB_OUTPUT
          else
            echo "❌ No index.html found"
            exit 1
          fi

      - name: Validate build index.html
        run: |
          if ! grep -q "assets/" "${{ steps.detect.outputs.web_dir }}/index.html"; then
            echo "❌ Invalid index.html (no /assets/)"
            exit 1
          fi

      - name: Force analyzeTicket inclusion
        run: |
          if ! grep -r "analyzeTicket" "${{ steps.detect.outputs.web_dir }}" --include="*.js" > /dev/null; then
            echo 'import "../../src/server-api/analyze-ticket";' >> "${{ steps.detect.outputs.web_dir }}/assets/force.js"
          fi

      - name: Create Capacitor config (iOS 18.0)
        run: |
          cat > capacitor.config.ts <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.jokerbaby.app',
            appName: 'Jokerbaby',
            webDir: '${{ steps.detect.outputs.web_dir }}',
            overrideUserAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 18_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/18.0 Mobile/15E148 Safari/604.1',
            ios: {
              deploymentTarget: '18.0',
              limitsNavigationsToAppBoundDomains: false
            },
            server: {
              iosScheme: 'https',
              hostname: 'app.jokerbaby.com',
              allowNavigation: [ "*.winamax.fr", "*.winamax.com" ]
            }
          };
          export default config;
          EOF

      - name: Add iOS platform (without sync)
        run: |
          rm -rf ios
          npx cap add ios

      # ------------------------------------------------------------
      # FORCER iOS 18.0 dans Podfile et projet Xcode (avant tout pod install)
      # ------------------------------------------------------------
      - name: Patch Podfile to iOS 18.0
        run: |
          sed -i '' 's/platform :ios, .*/platform :ios, "18.0"/' ios/App/Podfile
          echo "Podfile content:"
          cat ios/App/Podfile

      - name: Patch Xcode project deployment target
        run: |
          PROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 18.0/g' "$PROJ"
          grep "IPHONEOS_DEPLOYMENT_TARGET" "$PROJ" | head -3

      # ------------------------------------------------------------
      # Copie des assets (sans écraser index.html)
      # ------------------------------------------------------------
      - name: Copy web build to public
        run: |
          rm -rf ios/App/App/public
          mkdir -p ios/App/App/public
          cp -r ${{ steps.detect.outputs.web_dir }}/* ios/App/App/public/

      - name: Copy public/ assets (images, etc.)
        run: |
          if [ -d "public" ]; then
            cp -rf public/* ios/App/App/public/ 2>/dev/null || true
          fi

      - name: Copy PWA files
        run: |
          cd ios/App/App/public
          for f in manifest.webmanifest manifest.json icon-192.png icon-512.png apple-touch-icon.png; do
            [ -f "../../../../$f" ] && cp -f "../../../../$f" . || true
          done

      - name: Restore index.html if overwritten
        run: |
          cd ios/App/App/public
          if ! grep -q "assets/" index.html; then
            cp ${{ steps.detect.outputs.web_dir }}/index.html .
          fi

      # ------------------------------------------------------------
      # Capacitor copy + update (sans pod install automatique)
      # ------------------------------------------------------------
      - name: Capacitor copy (web assets only)
        run: npx cap copy ios

      - name: Capacitor update (plugins, but we'll pod install manually)
        run: npx cap update ios --no-install || true   # évite pod install
        # Si --no-install n'est pas supporté, on fait simplement pod install plus tard

      - name: Manual pod install (iOS 18.0)
        run: |
          cd ios/App
          pod install --repo-update

      # ------------------------------------------------------------
      # Icônes, permissions et ATS
      # ------------------------------------------------------------
      - name: Prepare icon
        run: |
          mkdir -p assets
          if [ -f "public/icon-512.png" ]; then cp public/icon-512.png assets/icon.png; \
          elif [ -f "icon-512.png" ]; then cp icon-512.png assets/icon.png; fi

      - name: Generate iOS icons
        run: |
          npm install -g @capacitor/assets
          npx capacitor-assets generate --ios || echo "Icon generation skipped"

      - name: Add permissions & ATS for Winamax
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Microphone required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSSpeechRecognitionUsageDescription string 'Speech recognition required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Camera required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Photos required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent bool true" $PLIST

      # ------------------------------------------------------------
      # Build archive and IPA
      # ------------------------------------------------------------
      - name: Build archive
        run: |
          cd ios
          rm -rf ~/Library/Developer/Xcode/DerivedData
          xcodebuild -workspace App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     archive

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R ios/App.xcarchive/Products/Applications/App.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-final
          path: app.ipa
          retention-days: 7