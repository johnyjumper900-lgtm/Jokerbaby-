name: Build Full iOS App (Icons + Assets)
on:
  push:
    branches: [ main ]
jobs: build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install Dependencies
        run: |
          bun install
          bun add -d @capacitor/assets
      - name: Build Web Project
        run: bun run build
      - name: Generate Assets (Icons & Splash)
        run: |
          # Assurez-vous d'avoir assets/logo.png ou resources/icon.png
          # Cette commande crée les icônes pour Xcode
          bun x capacitor-assets generate --ios
      - name: Capacitor Sync
        run: |
          bun x cap add ios || true
          bun x cap copy ios
          bun x cap sync ios
- name: Build Native iOS (Unsigned)