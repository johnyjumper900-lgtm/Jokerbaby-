mname: Build iOS IPA (Full project at root, no clobber)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build

      # ---------- Détection du dossier web ----------
      - name: 🔍 Trouver le vrai index.html
        id: webdir
        run: |
          if [ -d "dist/client" ] && [ -f "dist/client/index.html" ]; then
            echo "web_dir=dist/client" >> $GITHUB_OUTPUT
          elif [ -f "dist/index.html" ]; then
            echo "web_dir=dist" >> $GITHUB_OUTPUT
          else
            echo "❌ Aucun index.html généré"
            exit 1
          fi

      # ---------- Nettoyage et ajout plateforme iOS ----------
      - name: 📱 Régénérer iOS
        run: |
          rm -rf ios
          bunx cap add ios
          npx cap config webDir ${{ steps.webdir.outputs.web_dir }}

      # ---------- Copie du build web (fichiers critiques) ----------
      - name: 🧹 Copier le build web dans public
        run: |
          rm -rf ios/App/App/public
          mkdir -p ios/App/App/public
          cp -r ${{ steps.webdir.outputs.web_dir }}/* ios/App/App/public/

      # ---------- Copie de TOUS les fichiers du projet (sauf exclus) à la racine, sans écraser ----------
      - name: 📦 Aspiration totale du projet dans public (sans écraser)
        run: |
          # On copie tout le contenu du dépôt (sauf les dossiers exclus)
          # L'option -n empêche d'écraser les fichiers existants (index.html, assets/*.js, etc.)
          rsync -av --ignore-existing . ios/App/App/public/ \
            --exclude node_modules \
            --exclude .git \
            --exclude ios \
            --exclude DerivedData \
            --exclude .github \
            --exclude dist
          echo "✅ Tous les fichiers du projet ont été copiés à la racine de public"
          echo "📊 Taille finale du dossier public : $(du -sh ios/App/App/public | cut -f1)"

      # ---------- Vérification que l'index.html est toujours présent ----------
      - name: ✅ Vérifier index.html
        run: |
          if [ ! -f "ios/App/App/public/index.html" ]; then
            echo "❌ index.html a été écrasé !"
            # Recopie de secours
            cp ${{ steps.webdir.outputs.web_dir }}/index.html ios/App/App/public/
          fi
          if ! grep -qE '(src|href)="\.?/assets/' ios/App/App/public/index.html; then
            echo "❌ index.html invalide"
            cat ios/App/App/public/index.html
            exit 1
          fi
          echo "✅ index.html ok"

      # ---------- Capacitor sync (plugins) ----------
      - name: 🔄 Capacitor sync
        run: bunx cap sync ios

      # ---------- Compilation IPA ----------
      - name: 🛠️ Compiler l'IPA (unsigned)
        run: |
          cd ios
          DERIVED_DATA_PATH=$(pwd)/DerivedData
          rm -rf "$DERIVED_DATA_PATH"
          xcodebuild -workspace App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath "$DERIVED_DATA_PATH" \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     build
          APP_PATH=$(find "$DERIVED_DATA_PATH" -name "App.app" -path "*/Release-iphoneos/*" | head -n 1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ../App-unsigned.ipa Payload
          cd ..

      - name: 💾 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-app
          path: App-unsigned.ipa
          retention-days: 7