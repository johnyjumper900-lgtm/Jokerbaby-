name: Build Full iOS App
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # On installe TOUT, y compris les dépendances de dev (Capacitor CLI)
      - name: Install Dependencies
        run: bun install

      # Génération du code Web (le dossier 'dist')
      - name: Build Web Project
        run: bun run build

      # C'est ici que le "poids" de l'app se joue
      - name: Capacitor Setup & Sync
        run: |
          # Installation forcée des plateformes natives
          bun x cap add ios || true
          # On s'assure que le contenu de 'dist' est copié dans le projet iOS
          bun x cap copy ios
          bun x cap sync ios

      - name: Build Native iOS (Unsigned)
        run: |
          cd ios/App
          # Compilation sans signature pour éviter l'erreur de Team ID
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build-data \
                     SYMROOT=$(pwd)/build-output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean build

          # Construction de l'IPA
          mkdir -p Payload
          cp -r build-output/Release-iphoneos/App.app Payload/
          
          # Vérification du poids dans les logs
          echo "Vérification de la taille de l'App :"
          du -sh Payload/App.app
          
          zip -r ../../App-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: full-project-ipa
          path: App-unsigned.ipa
          if-no-files-found: error
