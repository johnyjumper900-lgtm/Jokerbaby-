name: Build iOS IPA (iOS 18, no auto pod)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          bun add @capacitor-community/speech-recognition @capacitor/browser

      - name: Build web
        run: bun run build

      - name: Detect web dir
        id: detect
        run: |
          if [ -d "dist/client" ] && [ -f "dist/client/index.html" ]; then
            echo "web_dir=dist/client" >> $GITHUB_OUTPUT
          elif [ -f "dist/index.html" ]; then
            echo "web_dir=dist" >> $GITHUB_OUTPUT
          else
            exit 1
          fi

      - name: Create Capacitor config (iOS 18)
        run: |
          cat > capacitor.config.ts <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.jokerbaby.app',
            appName: 'Jokerbaby',
            webDir: '${{ steps.detect.outputs.web_dir }}',
            ios: { deploymentTarget: '18.0' },
            server: { allowNavigation: [ "*.winamax.fr", "*.winamax.com" ] }
          };
          export default config;
          EOF

      - name: Add iOS platform (no sync)
        run: npx cap add ios

      # ------------------------------------------------------------
      # Forcer iOS 18.0 dans Podfile et Xcode project avant tout pod install
      # ------------------------------------------------------------
      - name: Force iOS 18 in Podfile
        run: |
          sed -i '' 's/platform :ios, .*/platform :ios, "18.0"/' ios/App/Podfile
          cat ios/App/Podfile

      - name: Force iOS 18 in Xcode project
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 18.0/g' ios/App/App.xcodeproj/project.pbxproj

      # ------------------------------------------------------------
      # Copie manuelle des assets web (évite le pod install automatique)
      # ------------------------------------------------------------
      - name: Copy web assets manually
        run: |
          rm -rf ios/App/App/public
          mkdir -p ios/App/App/public
          cp -r ${{ steps.detect.outputs.web_dir }}/* ios/App/App/public/
          if [ -d "public" ]; then cp -rf public/* ios/App/App/public/ 2>/dev/null || true; fi
          # Copie des fichiers PWA
          cd ios/App/App/public
          for f in manifest.webmanifest manifest.json icon-192.png icon-512.png apple-touch-icon.png; do
            [ -f "../../../../$f" ] && cp -f "../../../../$f" . || true
          done
          # Restauration index.html si nécessaire
          if ! grep -q "assets/" index.html; then
            cp ${{ steps.detect.outputs.web_dir }}/index.html .
          fi

      # ------------------------------------------------------------
      # Pod install manuel (avec iOS 18.0)
      # ------------------------------------------------------------
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      # ------------------------------------------------------------
      # Finalisation Capacitor (sans pod install)
      # ------------------------------------------------------------
      - name: Capacitor copy
        run: npx cap copy ios

      # ------------------------------------------------------------
      # Icônes, permissions, ATS
      # ------------------------------------------------------------
      - name: Generate icons
        run: |
          mkdir -p assets
          [ -f "public/icon-512.png" ] && cp public/icon-512.png assets/icon.png || true
          npm install -g @capacitor/assets
          npx capacitor-assets generate --ios || true

      - name: Add permissions & ATS
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Microphone required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSSpeechRecognitionUsageDescription string 'Speech recognition required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Camera required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Photos required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" $PLIST

      # ------------------------------------------------------------
      # Build archive et IPA
      # ------------------------------------------------------------
      - name: Build archive
        run: |
          cd ios
          rm -rf ~/Library/Developer/Xcode/DerivedData
          xcodebuild -workspace App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     archive

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R ios/App.xcarchive/Products/Applications/App.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-final
          path: app.ipa
          retention-days: 7