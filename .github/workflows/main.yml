name: Build iOS IPA (Final – iOS 17)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          bun add @capacitor-community/speech-recognition @capacitor/browser

      - name: Build web app
        run: bun run build

      - name: Detect build folder
        id: detect
        run: |
          if [ -d "dist/client" ] && [ -f "dist/client/index.html" ]; then
            echo "web_dir=dist/client" >> $GITHUB_OUTPUT
          elif [ -f "dist/index.html" ]; then
            echo "web_dir=dist" >> $GITHUB_OUTPUT
          elif [ -f "build/index.html" ]; then
            echo "web_dir=build" >> $GITHUB_OUTPUT
          else
            echo "❌ Aucun index.html trouvé"
            exit 1
          fi

      - name: Validate build index.html
        run: |
          BUILD_INDEX="${{ steps.detect.outputs.web_dir }}/index.html"
          if ! grep -q "assets/" "$BUILD_INDEX"; then
            echo "❌ index.html invalide (pas de lien /assets/)"
            cat "$BUILD_INDEX"
            exit 1
          fi

      - name: Force analyzeTicket inclusion
        run: |
          if ! grep -r "analyzeTicket" "${{ steps.detect.outputs.web_dir }}" --include="*.js" > /dev/null; then
            echo "// Force inclusion" >> "${{ steps.detect.outputs.web_dir }}/assets/force_analyze.js"
            echo "import '../../src/server-api/analyze-ticket';" >> "${{ steps.detect.outputs.web_dir }}/assets/force_analyze.js"
          fi

      - name: Create Capacitor config (iOS 17.0)
        run: |
          cat > capacitor.config.ts <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.jokerbaby.app',
            appName: 'Jokerbaby',
            webDir: '${{ steps.detect.outputs.web_dir }}',
            overrideUserAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1',
            ios: {
              deploymentTarget: '17.0',
              limitsNavigationsToAppBoundDomains: false
            },
            server: {
              iosScheme: 'https',
              hostname: 'app.jokerbaby.com',
              allowNavigation: [ "*.winamax.fr", "*.winamax.com" ]
            }
          };
          export default config;
          EOF

      - name: Clean and add iOS
        run: |
          rm -rf ios
          npx cap add ios

      - name: Set iOS 17.0 in Podfile and Xcode project
        run: |
          PODFILE="ios/App/Podfile"
          sed -i '' "s/^platform :ios, .*/platform :ios, '17.0'/" "$PODFILE"
          PROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 17.0/g' "$PROJ"

      - name: Copy web build to public
        run: |
          rm -rf ios/App/App/public
          mkdir -p ios/App/App/public
          cp -r ${{ steps.detect.outputs.web_dir }}/* ios/App/App/public/

      - name: Copy full static assets (public folder)
        run: |
          if [ -d "public" ]; then
            cp -rf public/* ios/App/App/public/ 2>/dev/null || true
          fi

      - name: Copy PWA files
        run: |
          cd ios/App/App/public
          for f in manifest.webmanifest manifest.json icon-192.png icon-512.png apple-touch-icon.png; do
            [ -f "../../../../$f" ] && cp -f "../../../../$f" . || true
          done

      - name: Ensure valid index.html
        run: |
          cd ios/App/App/public
          if [ ! -f "index.html" ] || ! grep -q "assets/" index.html; then
            cp ${{ steps.detect.outputs.web_dir }}/index.html .
          fi
          if ! grep -q "assets/" index.html; then
            echo "❌ Fatal: index.html still invalid"
            exit 1
          fi

      - name: Prepare app icon
        run: |
          mkdir -p assets
          if [ -f "public/icon-512.png" ]; then cp public/icon-512.png assets/icon.png; \
          elif [ -f "icon-512.png" ]; then cp icon-512.png assets/icon.png; \
          elif [ -f "public/apple-touch-icon.png" ]; then cp public/apple-touch-icon.png assets/icon.png; \
          else echo "No icon found, skipping generation"; exit 0; fi

      - name: Generate iOS icons
        run: |
          npm install -g @capacitor/assets
          npx capacitor-assets generate --ios || echo "Icon generation skipped"

      - name: Add permissions & ATS
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Microphone required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSSpeechRecognitionUsageDescription string 'Speech recognition required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Camera required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Photos required'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent bool true" $PLIST

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Build archive
        run: |
          cd ios
          rm -rf ~/Library/Developer/Xcode/DerivedData
          xcodebuild -workspace App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     archive

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R ios/App.xcarchive/Products/Applications/App.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-final
          path: app.ipa
          retention-days: 7