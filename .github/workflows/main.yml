name: Build iOS IPA (Full Project Copy)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web app
        run: bun run build

      - name: Detect web folder
        id: detect
        run: |
          if [ -d "dist/client" ] && [ -f "dist/client/index.html" ]; then
            echo "web_dir=dist/client" >> $GITHUB_OUTPUT
          elif [ -f "dist/index.html" ]; then
            echo "web_dir=dist" >> $GITHUB_OUTPUT
          else
            exit 1
          fi

      # Forcer l'inclusion d'analyzeTicket
      - name: Force analyzeTicket
        run: |
          WEB_DIR="${{ steps.detect.outputs.web_dir }}"
          if ! grep -r "analyzeTicket" "$WEB_DIR" --include="*.js"; then
            echo 'import { analyzeTicket } from "../../src/server-api/analyze-ticket";' >> "$WEB_DIR/assets/force.js"
            echo 'window.analyzeTicket = analyzeTicket;' >> "$WEB_DIR/assets/force.js"
          fi

      - name: Create Capacitor config (iOS 18)
        run: |
          cat > capacitor.config.ts <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.jokerbaby.app',
            appName: 'Jokerbaby',
            webDir: '${{ steps.detect.outputs.web_dir }}',
            ios: { deploymentTarget: '18.0' },
            server: { allowNavigation: [ "*.winamax.fr", "*.winamax.com" ] }
          };
          export default config;
          EOF

      - name: Add iOS platform (ignore initial pod failure)
        run: |
          rm -rf ios
          npx cap add ios || true

      - name: Force iOS 18 in Podfile & Xcode
        run: |
          sed -i '' 's/platform :ios, .*/platform :ios, "18.0"/' ios/App/Podfile
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 18.0/g' ios/App/App.xcodeproj/project.pbxproj

      - name: Manual pod install
        run: |
          cd ios/App
          pod install --repo-update

      # ------------------------------------------------------------
      # ÉTAPE CRITIQUE : Copie de TOUT le dépôt dans le dossier public
      # ------------------------------------------------------------
      - name: Copy entire project (except node_modules, .git, ios, dist)
        run: |
          TARGET="ios/App/App/public"
          # On commence par copier le build web (fichiers critiques)
          rm -rf "$TARGET"
          mkdir -p "$TARGET"
          cp -r ${{ steps.detect.outputs.web_dir }}/* "$TARGET/"
          # Puis on copie TOUT le reste du dépôt, sans écraser les fichiers déjà présents
          rsync -av --ignore-existing . "$TARGET/" \
            --exclude node_modules \
            --exclude .git \
            --exclude ios \
            --exclude dist \
            --exclude .github
          # Copie des fichiers PWA (manifest, icônes) à la racine (au cas où)
          cd "$TARGET"
          for f in manifest.webmanifest manifest.json icon-192.png icon-512.png apple-touch-icon.png; do
            [ -f "../../../../$f" ] && cp -f "../../../../$f" . 2>/dev/null || true
          done
          # Restauration de l'index.html si écrasé par erreur
          if ! grep -q "assets/" index.html; then
            cp ${{ steps.detect.outputs.web_dir }}/index.html .
          fi
          echo "✅ Tous les fichiers du projet ont été copiés dans $TARGET"
          echo "📊 Taille totale du dossier public : $(du -sh "$TARGET" | cut -f1)"

      - name: Capacitor copy
        run: npx cap copy ios

      - name: Force ATS and permissions
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent bool true" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Caméra requise'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Accès aux photos requis'" $PLIST 2>/dev/null || true

      - name: Build archive
        run: |
          cd ios
          rm -rf ~/Library/Developer/Xcode/DerivedData
          xcodebuild -workspace App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     archive

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R ios/App.xcarchive/Products/Applications/App.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-final
          path: app.ipa
          retention-days: 7