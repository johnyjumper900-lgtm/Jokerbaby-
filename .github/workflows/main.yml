name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # BUILD VITE
      - name: Build web app
        run: bun run build

      # Vérifie le dossier build
      - name: Detect build folder
        id: detect
        run: |
          if [ -f "dist/index.html" ]; then
            echo "web_dir=dist" >> $GITHUB_OUTPUT
          elif [ -f "dist/client/index.html" ]; then
            echo "web_dir=dist/client" >> $GITHUB_OUTPUT
          else
            echo "❌ Aucun build trouvé"
            exit 1
          fi

      # Force le bon webDir
      - name: Configure Capacitor
        run: |
          cat > capacitor.config.ts <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.jokerbaby.app',
            appName: 'Jokerbaby',
            webDir: '${{ steps.detect.outputs.web_dir }}',
            bundledWebRuntime: false
          };

          export default config;
          EOF

      # Ajoute iOS proprement
      - name: Add iOS
        run: |
          rm -rf ios
          npx cap add ios

      # Synchronise tout le projet web
      - name: Capacitor sync
        run: npx cap sync ios

      # COPIE TOTALE DU DOSSIER PUBLIC
      - name: Copy public assets
        run: |
          if [ -d "public" ]; then
            rsync -av public/ ios/App/App/public/
          fi

      # Vérifie les fichiers
      - name: Verify iOS public folder
        run: |
          ls -la ios/App/App/public
          test -f ios/App/App/public/index.html

      # Build iOS
      - name: Build iOS app
        run: |
          cd ios

          rm -rf ~/Library/Developer/Xcode/DerivedData

          xcodebuild \
            -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      # Création IPA
      - name: Package IPA
        run: |
          cd ios

          mkdir Payload

          APP=$(find App.xcarchive -name "*.app" | head -1)

          cp -R "$APP" Payload/App.app

          ditto -c -k --sequesterRsrc --keepParent Payload ../Jokerbaby.ipa

      # Upload IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: Jokerbaby.ipa
          retention-days: 7