name: Build Full iOS App (Auto-Init)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # 1. Génération forcée du dossier 'dist' (Build Web)
      - name: Build Web Project
        run: bun run build

      # 2. Initialisation et Synchronisation Capacitor
      - name: Capacitor Init & Sync
        run: |
          # On vérifie quel est le dossier de build web dans ton config (ex: dist)
          # On installe Capacitor s'il n'est pas présent
          bun install @capacitor/ios @capacitor/cli @capacitor/core
          # On crée le dossier ios s'il n'existe pas
          bun x cap add ios || true
          # On synchronise le build web (dist) dans le projet ios
          bun x cap sync ios

      # 3. Build Xcode sans signature
      - name: Build Native iOS (Unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build-data \
                     SYMROOT=$(pwd)/build-output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean build

          # 4. Création de l'IPA
          mkdir -p Payload
          cp -r build-output/Release-iphoneos/App.app Payload/
          
          # Vérification de la taille dans les logs pour être sûr
          echo "Taille de l'application :"
          du -sh Payload/App.app
          
          zip -r ../../App-unsigned.ipa Payload

      - name: Upload Full IPA
        uses: actions/upload-artifact@v4
        with:
          name: full-project-ipa
          path: App-unsigned.ipa
          if-no-files-found: error
